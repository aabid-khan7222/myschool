# Render Blueprint: Backend as Docker (required for Create School / tenant provisioning)
# Tenant provisioning uses controlled SQL import inside the app runtime.
# Add env vars in Render Dashboard → Environment (DATABASE_URL, PROVISIONING_SOURCE_DATABASE_URL, etc.)

services:
  - type: web
    name: myschool-backend
    runtime: docker
    rootDir: server
    dockerfilePath: ./Dockerfile
